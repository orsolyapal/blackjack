<!doctype html>
<html>
    <head>
        <title>Játékos beállítása</title>
        <link rel="stylesheet" href="./settings.css">
    </head>
    <body>
        <h2>Játékos beállítása</h2>

        <div>
            <h4>Aktív (kiválasztott) játékos:</h4>
            <div id="activePlayerName"></div>
        </div>
        <hr>

        <h4>Regisztrált játékosok:</h3>
        <table id="registeredPlayersTable">
            <thead>
                <th>Név</th>
                <th>Email</th>
            </thead>
            <tbody id="registeredPlayersTableBody"></tbody>
        </table>
        <hr>
        <div>
            <h4>Új játékos hozzáadása:</h2>
            <form id="addPlayerForm">
                <label>Név:</label>
                <input type="text" id="playerName" required placeholder="József">
                <label>E-mail cím:</label>
                <input type="email" id="playerEmail" required placeholder="minta@email.com">
                <button type="submit" id="btnAddPlayer">Hozzáad</button>                
            </form>
        </div>
        <hr>
        <br><br>
        <button id="btnOKSettings">Beállítások mentése</button>
        <button id="btnCancelSettings">Mégse</button>

        <script src="./settings.js"></script>
    </body>
</html>
